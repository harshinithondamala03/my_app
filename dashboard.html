
<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center">
<h2>TaskFlow Dashboard</h2>
<a href="/logout" class="btn btn-danger">Logout</a>
</div>

<div class="row mt-4">
<div class="col-md-4">
<div class="card shadow p-3">
<h5>Total Tasks</h5>
<h3>{{ tasks|length }}</h3>
</div>
</div>

<div class="col-md-4">
<div class="card shadow p-3">
<h5>Completed</h5>
<h3>{{ completed }}</h3>
</div>
</div>

<div class="col-md-4">
<div class="card shadow p-3">
<h5>Pending</h5>
<h3>{{ pending }}</h3>
</div>
</div>
</div>

<div class="card shadow p-4 mt-4">
<h4>Add Task</h4>
<form method="POST">
<input type="text" name="project_name" class="form-control mb-3" placeholder="Project Name" required>
<input type="text" name="task_title" class="form-control mb-3" placeholder="Task Title" required>
<button class="btn btn-primary">Add Task</button>
</form>
</div>

<div class="card shadow p-4 mt-4">
<h4>Task List</h4>

<table class="table">
<tr>
<th>Task</th>
<th>Status</th>
<th>Actions</th>
</tr>

{% for task in tasks %}
<tr>
<td>{{ task.title }}</td>
<td>
{% if task.status == 'Completed' %}
<span class="badge bg-success">Completed</span>
{% else %}
<span class="badge bg-warning">Pending</span>
{% endif %}
</td>

<td>
<a href="/complete/{{ task.id }}" class="btn btn-success btn-sm">Complete</a>
<a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</div>

</div>

</body>
</html>
